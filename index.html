<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#03121f" />
  <meta name="description" content="Abyssal — a premium living aquarium. Watch the fish drift through deep water, tap to feed them, and let the tide carry the evening." />
  <title>Abyssal · Living Aquarium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage" aria-label="Interactive aquarium">
    <canvas id="tank" aria-hidden="true"></canvas>

    <div class="vignette" aria-hidden="true"></div>
    <div class="surface-glow" aria-hidden="true"></div>

    <header class="masthead">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true"></span>
        <span class="brand__name">Abyssal</span>
      </div>
      <p class="brand__tag">A living aquarium</p>
    </header>

    <section class="readout" aria-live="polite">
      <div class="readout__item">
        <span class="readout__value" id="stat-fish">0</span>
        <span class="readout__label">fish</span>
      </div>
      <span class="readout__divider" aria-hidden="true"></span>
      <div class="readout__item">
        <span class="readout__value" id="stat-fed">0</span>
        <span class="readout__label">fed</span>
      </div>
    </section>

    <div class="hint" id="hint">
      <span class="hint__pulse" aria-hidden="true"></span>
      Tap the water to drop food
    </div>

    <div class="dock" role="toolbar" aria-label="Aquarium controls">
      <button class="dock__btn dock__btn--primary" id="btn-feed" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c0 4-3 5-3 9a3 3 0 0 0 6 0c0-4-3-5-3-9Z"/><circle cx="12" cy="13" r="1.2" fill="currentColor" stroke="none"/></svg>
        Feed
      </button>
      <div class="dock__group">
        <button class="dock__btn" id="btn-add" type="button" aria-label="Add a fish">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6v12M6 12h12"/></svg>
          <span>Add fish</span>
        </button>
        <button class="dock__btn" id="btn-remove" type="button" aria-label="Remove a fish">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12h12"/></svg>
          <span>Remove</span>
        </button>
      </div>
      <button class="dock__btn dock__btn--ghost" id="btn-motion" type="button" aria-pressed="false">
        <span class="dock__dot" aria-hidden="true"></span>
        <span id="btn-motion-label">Calm tide</span>
      </button>
    </div>
  </main>

  <script src="aquarium.js"></script>
</body>
</html>
